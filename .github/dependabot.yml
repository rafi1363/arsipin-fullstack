version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "bun"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "eslint"
        versions:
          - ">=10"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
