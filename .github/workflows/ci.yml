name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/arsipin?sslmode=disable
      JWT_SECRET: ci_only_secret
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run prisma:generate

      - name: Typecheck
        run: bun run typecheck

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
