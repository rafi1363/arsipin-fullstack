name: Deploy Backend Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  actions: read
  checks: read

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  verify-checks:
    name: Verify Required Checks
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve target SHA
        id: resolve
        run: echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify required checks are green
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          REQUIRED_CHECKS=("Backend" "Frontend" "CodeQL Analyze" "Secret Scan" "Dependency Scan")

          response=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/commits/$TARGET_SHA/check-runs?per_page=100")

          for check in "${REQUIRED_CHECKS[@]}"; do
            conclusion=$(echo "$response" | jq -r --arg check "$check" '
              [.check_runs[]
                | select(.name == $check and .status == "completed")
                | .conclusion] | last // empty
            ')

            if [ "$conclusion" != "success" ]; then
              echo "Required check '$check' is not successful for $TARGET_SHA"
              echo "Found conclusion: ${conclusion:-not_found}"
              exit 1
            fi

            echo "Check '$check' is successful"
          done

  verify-backend-staging:
    name: Verify Backend Staging Deployment
    runs-on: ubuntu-latest
    needs: verify-checks

    steps:
      - name: Verify backend staging already succeeded for this SHA
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ needs.verify-checks.outputs.target_sha }}
        run: |
          response=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/workflows/deploy-backend-staging.yml/runs?event=workflow_dispatch&status=completed&per_page=50")

          staging_run_id=$(echo "$response" | jq -r --arg sha "$TARGET_SHA" '
            [.workflow_runs[]
              | select(.head_sha == $sha and .conclusion == "success")]
            | first
            | .id // empty
          ')

          if [ -z "$staging_run_id" ]; then
            echo "No successful Deploy Backend Staging run found for SHA $TARGET_SHA"
            exit 1
          fi

          echo "Found successful backend staging deployment run: $staging_run_id"

  deploy:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    needs:
      - verify-checks
      - verify-backend-staging
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-checks.outputs.target_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run prisma:generate

      - name: Deploy Prisma migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run prisma:deploy

      - name: Typecheck backend
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: 5000
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: bun run typecheck

      - name: Validate Vercel backend production configuration
        env:
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=0

          for name in CORS_ORIGIN DATABASE_URL JWT_SECRET VERCEL_BACKEND_PROJECT_ID VERCEL_ORG_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "$name is required for backend production deployment"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        working-directory: backend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy backend production to Vercel
        id: vercel-deploy
        working-directory: backend
        env:
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          deployment_json=$(vercel deploy \
            --yes \
            --prod \
            --format json \
            --env DATABASE_URL="$DATABASE_URL" \
            --env JWT_SECRET="$JWT_SECRET" \
            --env PORT="5000" \
            --env CORS_ORIGIN="$CORS_ORIGIN" \
            --token="${{ secrets.VERCEL_TOKEN }}")

          deployment_url=$(echo "$deployment_json" | jq -r ".url // .deployment.url // empty")
          if [ -z "$deployment_url" ]; then
            echo "Unable to resolve deployment URL from Vercel deploy response"
            echo "$deployment_json"
            exit 1
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Backend production deployment: $deployment_url"
          echo "Backend production alias: https://arsipin-backend.vercel.app"

      - name: Verify backend production health
        run: curl --fail --show-error --silent "https://arsipin-backend.vercel.app/health"
