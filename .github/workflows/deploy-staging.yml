name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  actions: read
  checks: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  verify-checks:
    name: Verify Required Checks
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve target SHA
        id: resolve
        run: echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify required checks are green
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          REQUIRED_CHECKS=("Backend" "Frontend" "CodeQL Analyze" "Secret Scan" "Dependency Scan")

          response=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/commits/$TARGET_SHA/check-runs?per_page=100")

          for check in "${REQUIRED_CHECKS[@]}"; do
            conclusion=$(echo "$response" | jq -r --arg check "$check" '
              [.check_runs[]
                | select(.name == $check and .status == "completed")
                | .conclusion] | last // empty
            ')

            if [ "$conclusion" != "success" ]; then
              echo "Required check '$check' is not successful for $TARGET_SHA"
              echo "Found conclusion: ${conclusion:-not_found}"
              exit 1
            fi

            echo "Check '$check' is successful"
          done

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: verify-checks
    environment: staging
    timeout-minutes: 15

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-checks.outputs.target_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run prisma:generate

      - name: Typecheck backend
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: 5000
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: bun run typecheck

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: https://${{ vars.VERCEL_STAGING_ALIAS }}
        run: bun run build

      - name: Validate Vercel staging configuration
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: https://${{ vars.VERCEL_STAGING_ALIAS }}
          STAGING_ALIAS: ${{ vars.VERCEL_STAGING_ALIAS }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=0

          for name in NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_URL STAGING_ALIAS VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "$name is required for staging deployment"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel preview artifact
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: https://${{ vars.VERCEL_STAGING_ALIAS }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy staging to Vercel
        id: vercel-deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deployment_json=$(vercel deploy --prebuilt --format json --token="${{ secrets.VERCEL_TOKEN }}")
          deployment_url=$(echo "$deployment_json" | jq -r ".url // .deployment.url // empty")
          if [ -z "$deployment_url" ]; then
            echo "Unable to resolve deployment URL from Vercel deploy response"
            echo "$deployment_json"
            exit 1
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Staging deployment: $deployment_url"

      - name: Assign staging alias
        env:
          STAGING_ALIAS: ${{ vars.VERCEL_STAGING_ALIAS }}
        run: |
          if [ -z "$STAGING_ALIAS" ]; then
            echo "Repository/environment variable VERCEL_STAGING_ALIAS is required, for example arsipin-fullstack-stg.vercel.app"
            exit 1
          fi

          vercel alias set "${{ steps.vercel-deploy.outputs.deployment_url }}" "$STAGING_ALIAS" --token="${{ secrets.VERCEL_TOKEN }}"
          echo "Staging alias: https://$STAGING_ALIAS"
