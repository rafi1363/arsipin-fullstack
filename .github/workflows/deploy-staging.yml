name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  actions: read
  checks: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  verify-checks:
    name: Verify Required Checks
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve target SHA
        id: resolve
        run: echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify required checks are green
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          REQUIRED_CHECKS=("Backend" "Frontend" "Analyze" "Secret Scan" "Dependency Scan")

          response=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/commits/$TARGET_SHA/check-runs?per_page=100")

          for check in "${REQUIRED_CHECKS[@]}"; do
            conclusion=$(echo "$response" | jq -r --arg check "$check" '
              [.check_runs[]
                | select(.name == $check and .status == "completed")
                | .conclusion] | last // empty
            ')

            if [ "$conclusion" != "success" ]; then
              echo "Required check '$check' is not successful for $TARGET_SHA"
              echo "Found conclusion: ${conclusion:-not_found}"
              exit 1
            fi

            echo "Check '$check' is successful"
          done

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: verify-checks
    environment: staging
    timeout-minutes: 15

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-checks.outputs.target_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run prisma:generate

      - name: Typecheck backend
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: 5000
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: bun run typecheck

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: bun run build

      - name: Deploy staging
        run: echo "Replace this step with your staging deployment command"
